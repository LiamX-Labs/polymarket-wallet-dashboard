# Render Blueprint for Polymarket Wallet Dashboard
# FREE TIER VERSION - Uses ephemeral storage (data resets on restart)
# For persistent storage, upgrade to paid tier ($7/month per service with disk)

services:
  # Combined Tracker + API Service (to share ephemeral filesystem)
  - type: web
    name: polymarket-dashboard-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt &&
      cd server && npm install
    startCommand: |
      mkdir -p /tmp &&
      python3 market_tracker.py &
      sleep 10 &&
      cd server && npm run dev
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      # Tracker settings
      - key: TRACKER_POLL_INTERVAL_SECONDS
        value: 15
      - key: TRACKER_TRIGGER_TOLERANCE_SECONDS
        value: 20
      - key: TRACKER_DATABASE_PATH
        value: /tmp/tracker.sqlite3
      - key: TRACKER_DAILY_REPORT_HOUR_UTC
        value: 23
      - key: TRACKER_DRY_RUN
        value: true
      - key: GAMMA_API_BASE_URL
        value: https://gamma-api.polymarket.com
      - key: CLOB_API_BASE_URL
        value: https://clob.polymarket.com
      # API settings
      - key: TRACKER_DB_PATH
        value: /tmp/tracker.sqlite3
      - key: DASHBOARD_DB_PATH
        value: /tmp/dashboard.db
      # Optional Telegram (not used in dry run mode)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TRACKER_TELEGRAM_CHAT_ID
        sync: false

  # React Frontend (Static Site)
  - type: web
    name: polymarket-dashboard-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: polymarket-dashboard-api
          property: hostport
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
