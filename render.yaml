# Render Blueprint for Polymarket Wallet Dashboard
# This file defines all services needed to deploy the full stack app

services:
  # 1. Python Market Tracker (Background Worker)
  - type: worker
    name: polymarket-tracker
    runtime: python
    plan: free
    buildCommand: pip install python-dotenv aiohttp requests
    startCommand: python market_tracker.py
    envVars:
      - key: TRACKER_POLL_INTERVAL_SECONDS
        value: 15
      - key: TRACKER_TRIGGER_TOLERANCE_SECONDS
        value: 20
      - key: TRACKER_DATABASE_PATH
        value: /var/data/tracker.sqlite3
      - key: TRACKER_DAILY_REPORT_HOUR_UTC
        value: 23
      - key: TRACKER_DRY_RUN
        value: true
      - key: GAMMA_API_BASE_URL
        value: https://gamma-api.polymarket.com
      - key: CLOB_API_BASE_URL
        value: https://clob.polymarket.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Set in Render dashboard (optional, not used in dry run)
      - key: TRACKER_TELEGRAM_CHAT_ID
        sync: false  # Set in Render dashboard (optional, not used in dry run)
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1

  # 2. Node.js Backend Server (Web Service)
  - type: web
    name: polymarket-dashboard-api
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 10000  # Render default port
      - key: TRACKER_DB_PATH
        value: /var/data/tracker.sqlite3
      - key: DASHBOARD_DB_PATH
        value: /var/data/dashboard.db
      - key: NODE_ENV
        value: production
    disk:
      name: tracker-data  # Share same disk with tracker
      mountPath: /var/data
      sizeGB: 1

  # 3. React Frontend (Static Site)
  - type: web
    name: polymarket-dashboard-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: polymarket-dashboard-api
          property: hostport  # Automatically uses the API service URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
